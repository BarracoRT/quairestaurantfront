<div class="hero-scene text-center">

    <div class="hero-scene-content text-white">
        
        <h1>Inscription</h1>
        
    </div>

</div>

<div class="container pt-3">
  <form>
    <div class="form-group">
      <label for="NomInput">Nom</label>
      <input type="text" class="form-control" id="NomInput" aria-describedby="emailHelp" placeholder="Nom">
      
    </div>
    <div class="form-group">
      <label for="PrenomInput">Prenom</label>
      <input type="text" class="form-control" id="PrenomInput" aria-describedby="emailHelp" placeholder="Prenom">
    </div>
    <div class="form-group">
      <label for="exampleInputEmail1">Email</label>
      <input type="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp" placeholder="example@domain.com">
      
    </div>
    <div class="form-group">
      <label for="PasswordInput">Mot de passe</label>
      <input type="password" class="form-control" id="PasswordInput" aria-describedby="emailHelp" placeholder="********">
    </div>
    <div class="form-group">
      <label for="ValidatePasswordInput">Confirmer le mot de passe</label>
      <input type="password" class="form-control" id="ValidatePasswordInput" aria-describedby="emailHelp" placeholder="********">
    </div>
    
    <div class="text-center pt-3">
      <button type="submit" class="btn btn-primary">Inscription</button> 

    </div>

    <div class="text-center pt-3">

      <a href="/signin">Vous avez déjà un compte ? Connectez-vous ici</a>
    </div>


    
  </form>



</div>
