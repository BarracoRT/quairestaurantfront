<div class="hero-scene text-center">

    <div class="hero-scene-content text-white">
        
        <h1>Connexion</h1>
        
    </div>

</div>

<div class="container pt-3">
  <form>
    <div class="mb-3">
      <label for="EmailInput">Email</label>
      <input type="email" class="form-control" id="EmailInput" aria-describedby="emailHelp" placeholder="example@domain.com">
      <div class="invalid-feedback">
        Veuillez entrer une adresse email valide.
      </div>
    </div>
    <div class="mb-3">
      <label for="PasswordInput">Mot de passe</label>
      <input type="password" class="form-control" id="PasswordInput" placeholder="********">
    </div>
    
    <div class="text-center pt-3">
      <button type="button" class="btn btn-primary" id="btnSignin">Connexion</button> 
      
    </div>

    <div class="text-center pt-3">

      <a href="/signup">Vous n'avez pas de compte ? S'inscrire ici</a>
    </div>


    
  </form>



</div>
